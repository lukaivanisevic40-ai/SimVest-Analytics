document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"6d5708ef-001c-4d83-ad7e-4cd2cd20a030\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  body{background:#05070b;color:#e8edf2;font-family:'Space Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased}\n  a{color:#ffa028;text-decoration:none}\n  a:hover{color:#ffbf66}\n  ::selection{background:rgba(255,160,40,.28)}\n  h2{color:#f3f7fb;letter-spacing:-.01em}\n  @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}\n  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}\n  @keyframes glowpulse{0%,100%{opacity:.5}50%{opacity:1}}\n  .g-hero{display:grid;grid-template-columns:1.15fr .85fr}\n  .g-quick{display:grid;grid-template-columns:1fr 1fr}\n  .g-risk{display:grid;grid-template-columns:repeat(4,1fr)}\n  .g-losers{display:grid;grid-template-columns:repeat(3,1fr)}\n  .g-dd{display:grid;grid-template-columns:1fr 1fr}\n  .g-about{display:grid;grid-template-columns:1fr 1fr}\n  .g-alloc{display:grid;grid-template-columns:340px 1fr}\n  .hgrid{display:grid;grid-template-columns:92px 1fr 148px 188px 108px;gap:16px;align-items:center}\n  .wgrid{display:grid;grid-template-columns:76px 148px 118px 1fr 172px;gap:16px}\n  .dd-legend{display:none}\n  @media (max-width:899px){\n    .g-hero{grid-template-columns:1fr}\n    .g-risk{grid-template-columns:repeat(3,1fr)}\n    .g-alloc{grid-template-columns:1fr}\n    .hgrid{grid-template-columns:58px 1fr 96px 118px 76px;gap:10px}\n    .wgrid{grid-template-columns:1fr;gap:5px}\n    .whead{display:none}\n    .wrow{padding-top:16px;padding-bottom:16px}\n  }\n  @media (max-width:63  donutSegs=sectors.map(s=>{\n      const pct=map[s.name].v/T, len=pct*C, rot=-90+acc*360; acc+=pct;\n      const hov=st.hover===s.name, dim=st.hover&&!hov;\n      return {color:s.color, dash:len.toFixed(2)+' '+(C-len).toFixed(2), transform:'rotate('+rot.toFixed(2)+' 100 100)',\n        width:hov?32:26, opacity:dim?0.32:1, onEnter:()=>setHover(s.name), onLeave:clrHover, onClick:()=>setFilter(s.name)};\n    });\n    const hv=st.hover?sectors.find(x=>x.name===st.hover):null;\n    // holdings\n    const maxAlloc=Math.max(...this.raw.map(h=>h.value/T*100));\n    let rows=this.raw.filter(h=>st.filter==='All'||h.sector===st.filter).map(h=>{\n      const alloc=h.value/T*100; const open=st.expanded===h.ticker;\n      return {ticker:h.ticker,name:h.name,sector:h.sector,sectorLabel:secLabel(h.sector),color:SC[h.sector],\n        alloc, allocStr:alloc.toFixed(1)+'%', barWidth:(alloc/maxAlloc*100).toFixed(1)+'%',\n        change:h.change, changeStr:this.fmtPct(h.change), changeColor:h.change>=0?'#2bd67b':'#ff5964',\n        thesis:(t.thesis&&t.thesis[h.ticker])||'', thesisMax:open?'200px':'0px', caretRot:open?'rotate(90deg)':'none',\n        rowBg:open?'rgba(255,160,40,.05)':'transparent',\n        onToggle:()=>this.setState(s2=>({expanded:s2.expanded===h.ticker?null:h.ticker}))};\n    });\n    const dir=st.sortDir;\n    rows.sort((a,b)=> st.sortKey==='ticker'? a.ticker.localeCompare(b.ticker)*dir : st.sortKey==='change'? (a.change-b.change)*dir : (a.alloc-b.alloc)*dir);\n    // chips\n    const chip=(label,val)=>{ const on=st.filter===val; return {label,onClick:()=>setFilter(val),\n      border:on?'var(--acc)':'#232d3a', bg:on?'rgba(255,160,40,.14)':'#0d1219', fg:on?'#ffbf66':'var(--muted)'};};\n    const chipList=[chip(t.all,'All'), ...order.map(n=>chip(secLabel(n).toUpperCase(),n))];\n    // ticker\n    const tk=[...this.raw].sort((a,b)=>a.ticker.localeCompare(b.ticker)).map(h=>({ticker:h.ticker,changeStr:this.fmtPct(h.change),color:h.change>=0?'#2bd67b':'#ff5964'}));\n    // losers + watchlist\n    const losers=this.loserBase.map((b,i)=>({ticker:b.t,ret:b.r,body:t.losers[i].body,lesson:t.losers[i].lesson}));\n    const clrMap={acc:{fg:'var(--acc)',bd:'rgba(255,160,40,.3)',bg:'rgba(255,160,40,.07)'},muted:{fg:'var(--muted)',bd:'#232d3a',bg:'#0f151d'},green:{fg:'#2bd67b',bd:'rgba(43,214,123,.3)',bg:'rgba(43,214,123,.07)'}};\n    const watchlist=this.watchBase.map((b,i)=>({ticker:b.t,company:b.c,sector:t.watch[i].sector,thesis:t.watch[i].thesis,status:t.watch[i].status,sfg:clrMap[b.clr].fg,sbd:clrMap[b.clr].bd,sbg:clrMap[b.clr].bg}));\n    // steps\n    const steps=t.steps.map((s,i)=>({num:'0'+(i+1),title:s.title,body:s.body}));\n    // lang buttons\n    const langBtns=[['en','EN'],['es','ES'],['de','DE']].map(([code,label])=>{ const on=st.lang===code;\n      return {label,onClick:()=>this.setLang(code), bg:on?'var(--acc)':'transparent', fg:on?'#0a0a0a':'var(--muted)'};});\n    const arr=(k)=> st.sortKey===k?(st.sortDir>0?'▲':'▼'):'';\n    const hc=(k)=> st.sortKey===k?'#ffbf66':'var(--muted)';\n\n    return {\n      t, rootRef:this.rootRef, chartRef:this.chartRef, clock:st.clock, retStr:this.fmtPct(st.ret),\n      langBtns, showTable: st.mode!=='mobile', showCards: st.mode==='mobile',\n      toggleTrack:()=>this.setState(s2=>({trackOpen:!s2.trackOpen})),\n      trackMax: st.trackOpen?'320px':'0px', trackCaret: st.trackOpen?'rotate(90deg)':'none', trackLabel: st.trackOpen? t.hide : t.phases,\n      toggleMetrics:()=>this.setState(s2=>({metricsOpen:!s2.metricsOpen})),\n      metricsMax: st.metricsOpen?'1000px':'0px', metricsCaret: st.metricsOpen?'rotate(45deg)':'none',\n      metricsBtnLabel: st.metricsOpen? t.hideDetails : t.showDetails,\n      metricsSummary: '19 '+t.posWord+' · 7 '+t.sectorsWord+' · 1.4 Sharpe · -53% '+t.maxDDShort,\n      avgMonthlyStr: '+'+((Math.pow(1.9604,1/12)-1)*100).toFixed(1)+'%',\n      sectors, donutSegs,\n      donutCenterTop: hv? hv.pctStr : '7', donutCenterBot: hv? hv.label.toUpperCase() : t.sectorsDiversified,\n      donutCenterColor: hv? hv.color : '#e8edf2',\n      holdings: rows, chips: chipList, losers, watchlist, steps,\n      skills: t.skills,\n      resultLine: (st.filter==='All'? '19':rows.length)+' '+t.ofPositions+(st.filter==='All'?'':' · '+secLabel(st.filter)),\n      tickerLoop:[...tk,...tk],\n      sortTicker:()=>this.setSort('ticker'), sortAlloc:()=>this.setSort('alloc'), sortChange:()=>this.setSort('change'),\n      arrowTicker:arr('ticker'), arrowAlloc:arr('alloc'), arrowChange:arr('change'),\n      hdrTicker:hc('ticker'), hdrAlloc:hc('alloc'), hdrChange:hc('change')\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
